app-id: io.github.arcetos.Snipcom
runtime: org.kde.Platform
runtime-version: "6.8"
sdk: org.kde.Sdk
command: snipcom
finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  - --device=dri
  - --filesystem=home
  - --talk-name=org.freedesktop.FileManager1
modules:
  - name: python3-pyqt6
    buildsystem: simple
    build-commands:
      - pip3 install --prefix=/app --no-build-isolation PyQt6
    sources: []

  - name: snipcom
    buildsystem: simple
    build-commands:
      - install -Dm755 src/snipcom /app/bin/snipcom
      - install -Dm755 src/scm /app/bin/scm
      - rm -rf /app/bin/snipcom_app
      - cp -a src/snipcom_app /app/bin/snipcom_app
      - install -Dm644 flatpak/io.github.arcetos.Snipcom.desktop /app/share/applications/io.github.arcetos.Snipcom.desktop
      - install -Dm644 flatpak/io.github.arcetos.Snipcom.metainfo.xml /app/share/metainfo/io.github.arcetos.Snipcom.metainfo.xml
      - install -Dm644 assets/io.github.arcetos.Snipcom.svg /app/share/icons/hicolor/scalable/apps/io.github.arcetos.Snipcom.svg
    sources:
      - type: dir
        path: ..
